# 与 .editorconfig / Prettier / ESLint 约定一致的全量检查（PR 与 push 到 main）
name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate (typecheck, lint, format, test)
        run: npm run validate
